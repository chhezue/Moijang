name: "Refactor Item"
description: "EPIC/Task 공통 리팩토링 이슈 (초미니)"
title: "[EPIC-XXX] "
labels:
  - refactor
body:
  - type: dropdown
    id: epic_axis
    attributes:
      label: EPIC 축
      options:
        - EPIC-AUTH
        - EPIC-DOMAIN
        - EPIC-CHAT
        - EPIC-PAY
        - EPIC-MSG
        - EPIC-RELEASE
    validations:
      required: true

  - type: dropdown
    id: item_type
    attributes:
      label: 이슈 타입
      options:
        - EPIC
        - TASK
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: 상위 이슈 (선택)
      placeholder: "#123"
    validations:
      required: false

  - type: textarea
    id: objective
    attributes:
      label: 목표
      placeholder: |
        한두 줄로 핵심 목표 작성
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: 작업 항목
      placeholder: |
        - [ ] 항목 1
        - [ ] 항목 2
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료조건
      placeholder: |
        - [ ] 기능/동작 확인
        - [ ] 필요한 검증 완료
    validations:
      required: true
