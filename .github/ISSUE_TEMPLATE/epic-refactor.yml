name: "EPIC Refactor"
description: "리팩토링 축(EPIC) 단위의 목표/범위/완료조건을 정의합니다."
title: "[EPIC-XXX] "
labels:
  - epic
body:
  - type: dropdown
    id: epic_axis
    attributes:
      label: EPIC 축
      description: 어떤 리팩토링 축인지 선택하세요.
      options:
        - EPIC-AUTH (인증/계정 축)
        - EPIC-DOMAIN (도메인 전환 축)
        - EPIC-CHAT (커뮤니케이션 축)
        - EPIC-PAY (거래 축)
        - EPIC-MSG (알림 인프라 축)
        - EPIC-RELEASE (운영/배포 축)
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 문제정의
      description: 왜 이 EPIC 리팩토링이 필요한지 적어주세요.
      placeholder: |
        - 현재 문제:
        - 사용자/운영 영향:
        - 유지보수 상의 리스크:
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 목표 (Outcomes)
      description: 구현 상세보다 달성해야 할 결과를 적어주세요.
      placeholder: |
        - 예: 세션/토큰 라이프사이클을 단일 정책으로 통합
        - 예: 대학/기숙사 컨텍스트 접근제어를 API 전반에 일관 적용
    validations:
      required: true

  - type: textarea
    id: in_scope
    attributes:
      label: 범위 (In Scope)
      description: 이 EPIC에서 다루는 시스템/영역
      placeholder: |
        - Backend:
        - Frontend:
        - Infra:
    validations:
      required: true

  - type: textarea
    id: out_scope
    attributes:
      label: 범위 제외 (Out of Scope)
      description: 이번 EPIC에서 의도적으로 제외하는 항목
      placeholder: |
        - 예: 레거시 관리자 페이지 전면개편은 제외
    validations:
      required: false

  - type: textarea
    id: deliverables
    attributes:
      label: 산출물 (Deliverables)
      description: 완료 시점에 확인 가능한 결과물
      placeholder: |
        - [ ] 설계 문서
        - [ ] API 변경사항 반영
        - [ ] 마이그레이션/롤백 가이드
        - [ ] 모니터링 지표/대시보드
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료조건 (Definition of Done)
      description: EPIC 완료를 판단하는 기준
      placeholder: |
        - [ ] 핵심 사용자 시나리오 E2E 성공
        - [ ] 장애 대응/롤백 경로 검증 완료
        - [ ] 관련 팀 리뷰 승인 완료
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성 / 선행조건
      description: 선행 이슈, 외부 시스템, 타 팀 협업 등
      placeholder: |
        - Depends on:
        - Blocks:
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: 리스크 / 대응전략
      description: 예상 리스크와 예방/완화 계획
      placeholder: |
        - 리스크:
        - 탐지 시그널:
        - 대응책:
    validations:
      required: true
